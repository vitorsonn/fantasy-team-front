<div class="p-6 bg-slate-900 min-h-screen text-white">

  <div *ngIf="myTeam" class="mb-8 p-6 bg-slate-800 rounded-xl border border-slate-700 flex justify-between items-center shadow-md">
    <div>
      <h1 class="text-3xl font-bold text-emerald-400">{{ myTeam.name }}</h1>
      <p class="text-slate-400 text-sm">Dono: {{ myTeam.owner?.username }}</p>
    </div>
    <div class="text-right">
      <p class="text-xs text-slate-400 uppercase tracking-wider">Saldo Disponível</p>
      <p class="text-3xl font-black text-amber-400">$ {{ myTeam.cash | number:'1.2-2' }}</p>
    </div>
  </div>

  <div class="mb-6">
    <div class="relative max-w-md">
      <span class="absolute inset-y-0 left-0 flex items-center pl-3 text-slate-400">
        <svg class="w-5 h-5" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z"></path></svg>
      </span>
      <input
        type="text"
        (input)="onSearchChange($event)"
        placeholder="Pesquisar jogador por nome..."
        class="w-full pl-10 pr-4 py-2.5 bg-slate-800 border border-slate-700 rounded-xl text-slate-100 placeholder-slate-400 focus:outline-none focus:border-emerald-500 transition-all text-sm"
      />
    </div>
  </div>

  <div class="mb-6 flex flex-wrap gap-2">
    <button (click)="selectedPosition = 'TODOS'; itemsToShow = 12"
      [class]="selectedPosition === 'TODOS' ? 'bg-emerald-500 text-slate-900 font-bold' : 'bg-slate-800 text-slate-300'"
      class="px-4 py-2 rounded-lg text-sm transition-all">Todos</button>
    <button (click)="selectedPosition = 'GOLEIRO'; itemsToShow = 12"
      [class]="selectedPosition === 'GOLEIRO' ? 'bg-emerald-500 text-slate-900 font-bold' : 'bg-slate-800 text-slate-300'"
      class="px-4 py-2 rounded-lg text-sm transition-all">Goleiros</button>
    <button (click)="selectedPosition = 'ZAGUEIRO'; itemsToShow = 12"
      [class]="selectedPosition === 'ZAGUEIRO' ? 'bg-emerald-500 text-slate-900 font-bold' : 'bg-slate-800 text-slate-300'"
      class="px-4 py-2 rounded-lg text-sm transition-all">Defensores</button>
    <button (click)="selectedPosition = 'MEIA'; itemsToShow = 12"
      [class]="selectedPosition === 'MEIA' ? 'bg-emerald-500 text-slate-900 font-bold' : 'bg-slate-800 text-slate-300'"
      class="px-4 py-2 rounded-lg text-sm transition-all">Meio-Campo</button>
    <button (click)="selectedPosition = 'ATACANTE'; itemsToShow = 12"
      [class]="selectedPosition === 'ATACANTE' ? 'bg-emerald-500 text-slate-900 font-bold' : 'bg-slate-800 text-slate-300'"
      class="px-4 py-2 rounded-lg text-sm transition-all">Atacantes</button>
  </div>

  <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-4">
    <div *ngFor="let player of filteredPlayers | slice:0:itemsToShow"
      class="bg-slate-800 border border-slate-700 rounded-xl p-4 flex flex-col justify-between hover:border-emerald-500/50 transition-all shadow-sm">

      <div>
        <div class="flex justify-between items-start mb-2">
          <span class="text-xs px-2 py-0.5 bg-slate-700 text-emerald-400 font-mono rounded">
            {{ player.position }}
          </span>
          <span class="text-xs text-slate-400 truncate max-w-[120px]" *ngIf="player.team">
            {{ player.team.name }}
          </span>
        </div>
        <h3 class="font-semibold text-slate-100 truncate mb-1">{{ player.name }}</h3>
        <p class="text-sm font-bold text-amber-400">$ {{ player.currentPrice | number:'1.2-2' }}</p>
      </div>

      <button (click)="buyPlayer(player.id)"
        class="mt-4 w-full bg-slate-700 hover:bg-emerald-500 hover:text-slate-900 text-slate-200 font-medium py-2 px-4 rounded-lg text-sm transition-all">
        Comprar Atleta
      </button>
    </div>
  </div>

  <div *ngIf="filteredPlayers.length > itemsToShow" class="mt-8 text-center">
    <button (click)="loadMore()"
      class="bg-slate-800 hover:bg-slate-700 text-emerald-400 border border-slate-700 font-medium py-2 px-6 rounded-xl text-sm transition-all shadow-md">
      Carregar mais jogadores ({{ filteredPlayers.length - itemsToShow }} restantes)
    </button>
  </div>

  <div *ngIf="filteredPlayers.length === 0" class="text-center py-12 text-slate-500">
    Nenhum jogador encontrado com esses filtros ou nome.
  </div>

</div>
