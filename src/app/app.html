<div class="bg-slate-900 min-h-screen text-white">

  <header class="bg-slate-800 border-b border-slate-700 sticky top-0 z-50 shadow-md">
    <div class="max-w-7xl mx-auto px-6 flex justify-between items-center h-16">

      <!-- LOGO -->
      <div class="flex items-center gap-2 cursor-pointer" routerLink="/market">
        <span class="w-3 h-3 bg-emerald-500 rounded-full animate-pulse"></span>
        <span class="font-black text-xl tracking-wider text-slate-100">FANTASY<span class="text-emerald-400">GAME</span></span>
      </div>

      <nav class="flex gap-6 h-full">
        <a
          routerLink="/market"
          routerLinkActive="border-b-2 border-emerald-400 text-emerald-400 font-bold"
          [routerLinkActiveOptions]="{ exact: true }"
          class="flex items-center px-2 text-sm text-slate-400 hover:text-slate-200 transition-all h-16 cursor-pointer">
          🛒 Mercado
        </a>

        <a
          routerLink="/my-team"
          routerLinkActive="border-b-2 border-emerald-400 text-emerald-400 font-bold"
          class="flex items-center px-2 text-sm text-slate-400 hover:text-slate-200 transition-all h-16 cursor-pointer">
          🛡️ Meu Elenco
        </a>

        <a
          routerLink="/simulation"
          routerLinkActive="border-b-2 border-emerald-400 text-emerald-400 font-bold"
          class="flex items-center px-2 text-sm text-slate-400 hover:text-slate-200 transition-all h-16 cursor-pointer">
          ⚽ Simulação
        </a>
      </nav>
    </div>
  </header>

  <main class="max-w-7xl mx-auto">
    <router-outlet></router-outlet>
  </main>

</div>
